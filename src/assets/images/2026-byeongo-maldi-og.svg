<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- 5행의 부드러운 산 실루엣 (오행 시각화) -->
  <path d="M0,500 Q200,420 400,460 T800,440 T1200,470 L1200,630 L0,630 Z" fill="#ea580c" fill-opacity="0.15"/>
  <path d="M0,540 Q300,460 600,500 T1200,510 L1200,630 L0,630 Z" fill="#c2410c" fill-opacity="0.2"/>

  <!-- 태양 (丙火 상징) -->
  <circle cx="950" cy="160" r="60" fill="#fb923c"/>
  <circle cx="950" cy="160" r="80" fill="#fb923c" fill-opacity="0.2"/>

  <!-- 본문 텍스트 -->
  <g font-family="system-ui, -apple-system, 'Apple SD Gothic Neo', sans-serif" fill="#7c2d12" text-anchor="middle">
    <text x="600" y="280" font-size="56" font-weight="700">2026년 병오년 말띠 아기 운세</text>
    <text x="600" y="340" font-size="32" font-weight="500" fill="#92400e">명리 4기준으로 보는 성격 · 건강 · 관계</text>
    <text x="600" y="400" font-size="24" font-weight="400" fill="#a16207">사주천명연구소 | sajucmlab.com</text>
  </g>

  <!-- 구분선 -->
  <line x1="450" y1="440" x2="750" y2="440" stroke="#ea580c" stroke-width="2" stroke-opacity="0.4"/>
</svg>